}function resetTimeOnly(){running=false;launchMode=false;launchOverlay.classList.remove('show','green');elapsedMs=0;startPerf=0;if(rafId){cancelAnimationFrame(rafId);rafId=null}btnStartPause.textContent='Iniciar';renderAll();save()}function clearAll(){riders.forEach(r=>{r.events=[];r.redo=[];r.sectorIdx=0;r.lastTapEpoch=0});nextIndex=0;elapsedMs=0;running=false;launchMode=false;if(rafId){cancelAnimationFrame(rafId);rafId=null}btnStartPause.textContent='Iniciar';renderAll();save()}function snapshotCurrentSession(){return{id:uid(),name:elSessionName.value||`Tanda ${dayHistory.length+1}`,track:elTrackName.value||'',notes:elSessionNotes.value||'',setupNotes:elSetupNotes.value||'',dateISO:new Date().toISOString(),dateText:new Date().toLocaleString(),prepSec:getPrepSec(),gapSec:Math.round(getGapMs()/1000),sectors:getSectors(),riders:JSON.parse(JSON.stringify(riders))}}function finishSession(){if(riders.every(r=>r.events.length===0)){showToast('No hay tiempos para guardar');return}dayHistory.push(snapshotCurrentSession());saveDayHistory();showToast('Tanda guardada ✔');clearAll();if(!elSessionName.value)elSessionName.value=`Tanda ${dayHistory.length+1}`;renderAll();save()}function recomputeSectorIdx(r){let sec=getSectors();if(sec<=0){r.sectorIdx=0;return}let last=[...r.events].reverse().find(e=>e.kind==='SECTOR');r.sectorIdx=last?Number(last.sectorNo)%sec:0}function mark(idx){
  let tEpoch=Date.now(),dbl=getDblMs(),r=riders[idx];
  if(dbl>0&&(tEpoch-(r.lastTapEpoch||0))<dbl){
    if(!confirm(`¿Confirmás el tap seguido para ${r.name}?`))return;
  }
  r.lastTapEpoch=tEpoch;
  r.redo=[];

  let totalMs=nowElapsed(),netMs=totalNetMs(idx,totalMs),sec=getSectors();
  let lastNet=r.events.length?r.events[r.events.length-1].totalNetMs:0;
  let deltaNet=netMs-lastNet;
  let label='',timeMs=deltaNet,isBest=false,displayMs=2000;

  if(sec>0){
    let sectorNo=r.sectorIdx+1;
    r.events.push({kind:'SECTOR',riderIndex:idx,riderName:r.name,sectorNo,totalMs,totalNetMs:netMs,deltaNetMs:deltaNet,stampEpoch:tEpoch});
    label=`P${sectorNo}/${sec}`;
    r.sectorIdx++;

    if(r.sectorIdx>=sec){
      let previousLaps=r.events.filter(x=>x.kind==='LAP');
      let lapNo=previousLaps.length+1;
      let prev=previousLaps.length?previousLaps[previousLaps.length-1]:null;
      let prevTotal=prev?prev.totalNetMs:0;
      let lapNet=netMs-prevTotal;
      let prevBest=previousLaps.length?Math.min(...previousLaps.map(x=>x.lapNetMs)):Infinity;
      isBest=lapNet<prevBest;
      r.events.push({kind:'LAP',riderIndex:idx,riderName:r.name,lapNo,totalMs,totalNetMs:netMs,deltaNetMs:lapNet,lapNetMs:lapNet,stampEpoch:tEpoch});
      r.sectorIdx=0;
      label=`${isBest?'⭐ ':''}Vuelta ${lapNo}`;
      timeMs=lapNet;
      displayMs=isBest?3000:2000;
    }
  }else{
    let previousLaps=r.events.filter(x=>x.kind==='LAP');
    let lapNo=previousLaps.length+1;
    let prev=previousLaps.length?previousLaps[previousLaps.length-1]:null;
    let prevTotal=prev?prev.totalNetMs:0;
    let lapNet=netMs-prevTotal;
    let prevBest=previousLaps.length?Math.min(...previousLaps.map(x=>x.lapNetMs)):Infinity;
    isBest=lapNet<prevBest;
    r.events.push({kind:'LAP',riderIndex:idx,riderName:r.name,lapNo,totalMs,totalNetMs:netMs,deltaNetMs:lapNet,lapNetMs:lapNet,stampEpoch:tEpoch});
    label=`${isBest?'⭐ ':''}Vuelta ${lapNo}`;
    timeMs=lapNet;
    displayMs=isBest?3000:2000;
  }

  confirmMap[r.id]={label,time:formatQuick(timeMs)};
  setTimeout(()=>{delete confirmMap[r.id];renderButtons()},displayMs);

  nextIndex=(idx+1)%riders.length;
  renderButtons();
  renderTables();
  save();
}function undo(idx){let r=riders[idx],last=r.events.pop();if(!last)return;r.redo.push(last);recomputeSectorIdx(r);renderAll();save()}function redo(idx){let r=riders[idx],item=r.redo.pop();if(!item)return;r.events.push(item);recomputeSectorIdx(r);renderAll();save()}function clearRider(idx){let r=riders[idx];r.events=[];r.redo=[];r.sectorIdx=0;r.lastTapEpoch=0;renderAll();save()}function addRider(name=''){let i=riders.length;riders.push({id:uid(),name:name||`Piloto ${i+1}`,color:PALETTE[i%PALETTE.length],events:[],sectorIdx:0,lastTapEpoch:0,redo:[]});renderAll();save()}function removeRider(idx){let r=riders[idx];if(!confirm(`¿Borrar a ${r.name}?`))return;riders.splice(idx,1);nextIndex=0;renderAll();save()}function move(idx,dir){let j=idx+dir;if(j<0||j>=riders.length)return;[riders[idx],riders[j]]=[riders[j],riders[idx]];nextIndex=0;renderAll();save()}function restoreNames(){riders=DEFAULT_NAMES.map((name,i)=>({id:uid(),name,color:PALETTE[i%PALETTE.length],events:[],sectorIdx:0,lastTapEpoch:0,redo:[]}));nextIndex=0;renderAll();save()}function buildSessionsForExport(){let s=dayHistory.slice();if(!riders.every(r=>r.events.length===0))s.push(snapshotCurrentSession());return s}function exportExcelLikeXls(){
  let sessions=buildSessionsForExport();
  if(!sessions.length){
    showToast('No hay tandas para exportar');
    return;
  }

  let esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let html=`<html><head><meta charset="utf-8"><style>
    body{font-family:Arial}
    table{border-collapse:collapse;margin-bottom:20px}
    th,td{border:1px solid #ccc;padding:6px 8px;font-size:12px;white-space:nowrap;text-align:center}
    th{background:#f2f2f2}
    td:first-child,th:first-child{text-align:left;font-weight:bold}
    .best{font-weight:bold;background:#d9f7d9}
    .title{font-size:18px;font-weight:bold;background:#d9e8ff;text-align:left}
    .meta{font-size:11px;color:#555;margin-bottom:6px}
    .totalrow td{background:#fafafa}
      </style></head><body><h1>Jornada Cronómetro Enduro</h1>`;

  function lapsAndSectors(r, sectors){
    let laps=[];
    let cur=[];
    r.events.forEach(e=>{
      if(e.kind==='SECTOR') cur.push(e);
      if(e.kind==='LAP'){
        laps.push({lap:e,sectors:cur.slice()});
        cur=[];
      }
    });
    return laps;
  }

  sessions.forEach((session,sidx)=>{
    let title=esc(session.name||('Tanda '+(sidx+1)));
    html+=`<table><tr><td class="title" colspan="50">${title}</td></tr></table>`;
    html+=`<div class="meta">${esc(session.dateText)} · ${esc(session.track||'Sin pista')} · Gap ${esc(session.gapSec)}s · Parciales ${esc(session.sectors?session.sectors:'OFF')}</div>`;

    let sectors=Number(session.sectors||0);

    if(sectors>0){
      let ridersData=session.riders.map(r=>({r,laps:lapsAndSectors(r,sectors)}));
      let maxLaps=Math.max(0,...ridersData.map(x=>x.laps.length));

      html+=`<table><thead><tr><th>Piloto</th>`;
      for(let l=1;l<=maxLaps;l++){
        for(let p=1;p<=sectors;p++) html+=`<th>V${l}.${p}</th>`;
      }
      html+=`</tr></thead><tbody>`;

      ridersData.forEach(obj=>{
        let r=obj.r, laps=obj.laps;
        let lapOnly=laps.map(x=>x.lap);
        let best=lapOnly.length?Math.min(...lapOnly.map(x=>x.lapNetMs)):Infinity;

        html+=`<tr><td>${esc(r.name)}</td>`;
        for(let l=0;l<maxLaps;l++){
          let pack=laps[l];
          for(let p=0;p<sectors;p++){
            let secEv=pack&&pack.sectors[p];
            html+=secEv?`<td>${esc(formatQuick(secEv.deltaNetMs))}</td>`:`<td></td>`;
          }
        }
        html+=`</tr>`;

        html+=`<tr class="totalrow"><td></td>`;
        for(let l=0;l<maxLaps;l++){
          let pack=laps[l];
          for(let p=0;p<sectors;p++){
            if(pack && p===sectors-1){
              let cls=pack.lap.lapNetMs===best?'best':'';
              let star=pack.lap.lapNetMs===best?'⭐ ':'';
              html+=`<td class="${cls}">${star}${esc(formatQuick(pack.lap.lapNetMs))}</td>`;
            }else{
              html+=`<td></td>`;
            }
          }
        }
        html+=`</tr>`;
      });

      html+=`</tbody></table>`;
    }else{
      let summary=session.riders.map(r=>{
        let laps=r.events.filter(e=>e.kind==='LAP');
        let best=laps.length?Math.min(...laps.map(x=>x.lapNetMs)):Infinity;
        return {name:r.name,laps,best};
      });
      let maxLaps=Math.max(0,...summary.map(s=>s.laps.length));

      html+=`<table><thead><tr><th>Piloto</th>`;
      for(let i=1;i<=maxLaps;i++) html+=`<th>V${i}</th>`;
      html+=`<th>Mejor</th></tr></thead><tbody>`;

      summary.forEach(s=>{
        html+=`<tr><td>${esc(s.name)}</td>`;
        for(let i=0;i<maxLaps;i++){
          let lap=s.laps[i];
          if(!lap) html+=`<td></td>`;
          else{
            let cls=lap.lapNetMs===s.best?'best':'';
            let star=lap.lapNetMs===s.best?'⭐ ':'';
            html+=`<td class="${cls}">${star}${esc(formatQuick(lap.lapNetMs))}</td>`;
          }
        }
        html+=`<td class="best">${s.best<Infinity?'⭐ '+esc(formatQuick(s.best)):''}</td></tr>`;
      });

      html+=`</tbody></table>`;
    }
  });

  html+='</body></html>';
  let blob=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'});
  let url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;
  a.download=`jornada_enduro_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.xls`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('Jornada exportada ✔');
}btnStartPause.onclick=()=>running?pause():start();btnReset.onclick=resetTimeOnly;btnFinishSession.onclick=()=>{if(confirm('¿Finalizar y guardar esta tanda?'))finishSession()};btnClearAll.onclick=()=>{if(confirm('¿Vaciar registros de la tanda actual?'))clearAll()};btnClearDay.onclick=()=>{if(confirm('¿Borrar la jornada actual completa?')){dayHistory=[];saveDayHistory();renderAll()}};btnExport.onclick=exportExcelLikeXls;btnToggleButtons.onclick=()=>{document.body.classList.toggle('buttonsOnly');save()};btnAddRider.onclick=()=>addRider();btnResetNames.onclick=()=>{if(confirm('¿Restaurar nombres por defecto?'))restoreNames()};[elPrepSec,elGap,elDblMs,elTrackName,elSessionName,elSessionNotes,elSetupNotes].forEach(el=>el.oninput=()=>{renderAll();save()});elSectors.onchange=()=>{riders.forEach(r=>{r.sectorIdx=0;r.redo=[]});renderAll();save()};loadDayHistory();load();ensureDefaults();renderAll();setTimeout(()=>{
  const splash=document.getElementById('splashScreen');
  if(splash){
    splash.classList.add('hide');
    setTimeout(()=>splash.classList.add('gone'),450);
  }
},2000);  setTimeout(()=>{   const splash=document.getElementById('splashScreen');   if(splash){     splash.classList.add('hide');     setTimeout(()=>splash.classList.add('gone'),450);   } },2000);  window.addEventListener('visibilitychange',save);window.addEventListener('beforeunload',save)})();
</script></body></html>
